<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="a3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/></marker>
    <style>
      .h{fill:#1f2733;font-size:18px;font-weight:700}
      .t{fill:#1f2733;font-size:13.5px;font-weight:600}
      .s{fill:#5b6470;font-size:12px}
      .y{fill:#2e7d4f;font-size:11.5px;font-weight:600}
      .n{fill:#5b6470;font-size:11.5px}
    </style>
  </defs>
  <rect width="940" height="560" fill="#fbf9f4"/>
  <text x="32" y="40" class="h">PreToolUse decision flow</text>
  <text x="32" y="61" class="s">What Quill does between the agent asking and the tool running. CRITICAL never auto-approves.</text>

  <!-- start -->
  <rect x="380" y="84" width="180" height="44" rx="22" fill="#eef2f7" stroke="#c5cfdb"/>
  <text x="470" y="111" text-anchor="middle" class="t">tool call intercepted</text>

  <!-- classify -->
  <rect x="360" y="150" width="220" height="48" rx="10" fill="#fff" stroke="#1f2733"/>
  <text x="470" y="172" text-anchor="middle" class="t">classify risk</text>
  <text x="470" y="189" text-anchor="middle" class="s">command patterns + tool table</text>

  <!-- critical diamond -->
  <polygon points="470,218 560,262 470,306 380,262" fill="#fdeaea" stroke="#e29393"/>
  <text x="470" y="258" text-anchor="middle" class="t">CRITICAL?</text>
  <text x="470" y="276" text-anchor="middle" class="s">rm -rf, DROP…</text>

  <rect x="640" y="238" width="170" height="48" rx="10" fill="#fdeaea" stroke="#cf6f6f"/>
  <text x="725" y="260" text-anchor="middle" class="t" fill="#b23b3b">DENY</text>
  <text x="725" y="277" text-anchor="middle" class="s">+ safer suggestion</text>

  <!-- trifecta diamond -->
  <polygon points="470,326 565,372 470,418 375,372" fill="#fdeaea" stroke="#e29393"/>
  <text x="470" y="368" text-anchor="middle" class="t">closes trifecta?</text>
  <text x="470" y="386" text-anchor="middle" class="s">3rd capability</text>

  <rect x="640" y="348" width="170" height="48" rx="10" fill="#fdeaea" stroke="#cf6f6f"/>
  <text x="725" y="370" text-anchor="middle" class="t" fill="#b23b3b">DENY → approve</text>
  <text x="725" y="387" text-anchor="middle" class="s">issue one-shot token</text>

  <!-- high diamond -->
  <polygon points="470,438 565,484 470,530 375,484" fill="#fdf3e0" stroke="#e7c277"/>
  <text x="470" y="480" text-anchor="middle" class="t">HIGH risk?</text>
  <text x="470" y="498" text-anchor="middle" class="s">Edit/Write/etc.</text>

  <!-- high outcomes -->
  <rect x="620" y="430" width="290" height="44" rx="10" fill="#fdf3e0" stroke="#e7c277"/>
  <text x="765" y="457" text-anchor="middle" class="s">trusted dir / bypass / approved → <tspan class="y">ALLOW</tspan></text>
  <rect x="620" y="482" width="290" height="48" rx="10" fill="#fdf3e0" stroke="#e7c277"/>
  <text x="765" y="503" text-anchor="middle" class="s">overnight on → ALLOW + <tspan fill="#b27a1b" font-weight="600">flag.uncertain</tspan></text>
  <text x="765" y="520" text-anchor="middle" class="s">else → <tspan fill="#b27a1b" font-weight="600">ASK</tspan> human</text>

  <!-- allow low -->
  <rect x="120" y="460" width="180" height="48" rx="10" fill="#e7f5ec" stroke="#7cc69a"/>
  <text x="210" y="482" text-anchor="middle" class="t" fill="#2e7d4f">ALLOW</text>
  <text x="210" y="499" text-anchor="middle" class="s">low / medium, silent</text>

  <!-- edges -->
  <line x1="470" y1="128" x2="470" y2="150" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="470" y1="198" x2="470" y2="218" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="560" y1="262" x2="640" y2="262" stroke="#cf6f6f" stroke-width="1.5" marker-end="url(#a3)"/><text x="600" y="254" text-anchor="middle" class="y" fill="#b23b3b">yes</text>
  <line x1="470" y1="306" x2="470" y2="326" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/><text x="486" y="320" class="n">no</text>
  <line x1="565" y1="372" x2="640" y2="372" stroke="#cf6f6f" stroke-width="1.5" marker-end="url(#a3)"/><text x="602" y="364" text-anchor="middle" class="y" fill="#b23b3b">yes</text>
  <line x1="470" y1="418" x2="470" y2="438" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/><text x="486" y="432" class="n">no</text>
  <line x1="565" y1="484" x2="620" y2="484" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/><text x="592" y="476" text-anchor="middle" class="y" fill="#b27a1b">yes</text>
  <line x1="375" y1="484" x2="300" y2="484" stroke="#5b6470" stroke-width="1.5" marker-end="url(#a3)"/><text x="338" y="476" text-anchor="middle" class="n">no</text>
</svg>
