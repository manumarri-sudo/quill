<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 460" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/></marker>
    <style>
      .box{rx:10;stroke-width:1.5}
      .t{fill:#1f2733;font-size:15px;font-weight:600}
      .s{fill:#5b6470;font-size:12.5px}
      .lbl{fill:#5b6470;font-size:12px}
      .h{fill:#1f2733;font-size:18px;font-weight:700}
    </style>
  </defs>
  <rect width="940" height="460" fill="#fbf9f4"/>
  <text x="32" y="42" class="h">How Quill works</text>
  <text x="32" y="64" class="s">A PreToolUse hook gates every tool call, then signs the outcome into an append-only chain.</text>

  <!-- agent -->
  <rect x="32" y="100" width="150" height="74" rx="10" fill="#eef2f7" stroke="#c5cfdb"/>
  <text x="107" y="132" text-anchor="middle" class="t">AI agent</text>
  <text x="107" y="152" text-anchor="middle" class="s">Claude Code / Cursor</text>

  <!-- hook -->
  <rect x="232" y="100" width="160" height="74" rx="10" fill="#e7eefc" stroke="#9db8ec"/>
  <text x="312" y="128" text-anchor="middle" class="t">PreToolUse hook</text>
  <text x="312" y="148" text-anchor="middle" class="s">fires before the call</text>
  <text x="312" y="164" text-anchor="middle" class="lbl">stdin JSON → stdout JSON</text>

  <!-- gate -->
  <rect x="442" y="86" width="220" height="190" rx="12" fill="#fff" stroke="#1f2733" stroke-width="2"/>
  <text x="552" y="112" text-anchor="middle" class="t">Quill gate</text>
  <rect x="462" y="126" width="180" height="40" rx="8" fill="#f3eee2" stroke="#d8cdb0"/>
  <text x="552" y="151" text-anchor="middle" class="s">classify risk (low→critical)</text>
  <rect x="462" y="174" width="180" height="40" rx="8" fill="#f3eee2" stroke="#d8cdb0"/>
  <text x="552" y="199" text-anchor="middle" class="s">trifecta + trust + overnight</text>
  <rect x="462" y="222" width="180" height="40" rx="8" fill="#f3eee2" stroke="#d8cdb0"/>
  <text x="552" y="247" text-anchor="middle" class="s">decide: allow / ask / deny</text>

  <!-- verdicts -->
  <rect x="712" y="92" width="196" height="40" rx="8" fill="#e7f5ec" stroke="#7cc69a"/>
  <text x="810" y="117" text-anchor="middle" class="s">allow — call runs silently</text>
  <rect x="712" y="142" width="196" height="40" rx="8" fill="#fdf3e0" stroke="#e7c277"/>
  <text x="810" y="167" text-anchor="middle" class="s">ask — human confirms</text>
  <rect x="712" y="192" width="196" height="40" rx="8" fill="#fdeaea" stroke="#e29393"/>
  <text x="810" y="217" text-anchor="middle" class="s">deny — blocked + reason</text>

  <!-- audit chain -->
  <rect x="232" y="320" width="676" height="96" rx="12" fill="#1f2733"/>
  <text x="252" y="350" class="t" fill="#fff">Signed audit chain</text>
  <text x="252" y="372" class="s" fill="#aab4c2">~/.quill/audit.log.jsonl · HMAC-SHA256, each line chains to the previous</text>
  <g>
    <rect x="560" y="338" width="60" height="30" rx="5" fill="#33415c"/><text x="590" y="358" text-anchor="middle" class="lbl" fill="#cdd6e4">evₙ₋₁</text>
    <rect x="632" y="338" width="60" height="30" rx="5" fill="#33415c"/><text x="662" y="358" text-anchor="middle" class="lbl" fill="#cdd6e4">evₙ</text>
    <rect x="704" y="338" width="60" height="30" rx="5" fill="#33415c"/><text x="734" y="358" text-anchor="middle" class="lbl" fill="#cdd6e4">evₙ₊₁</text>
    <line x1="620" y1="353" x2="632" y2="353" stroke="#7cc69a" stroke-width="2" marker-end="url(#arr)"/>
    <line x1="692" y1="353" x2="704" y2="353" stroke="#7cc69a" stroke-width="2" marker-end="url(#arr)"/>
  </g>
  <text x="252" y="404" class="lbl" fill="#aab4c2">derives → receipts · trifecta state · A2A handoff graph · evidence pack</text>

  <!-- flows -->
  <line x1="182" y1="137" x2="232" y2="137" stroke="#5b6470" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="392" y1="137" x2="442" y2="137" stroke="#5b6470" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="662" y1="150" x2="712" y2="112" stroke="#5b6470" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="180" x2="712" y2="162" stroke="#5b6470" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="662" y1="212" x2="712" y2="212" stroke="#5b6470" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="552" y1="276" x2="552" y2="320" stroke="#5b6470" stroke-width="2" marker-end="url(#arr)"/>
  <text x="566" y="304" class="lbl">every verdict logged</text>
</svg>
