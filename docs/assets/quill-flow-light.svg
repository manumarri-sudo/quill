<svg xmlns="http://www.w3.org/2000/svg" width="920" height="360" viewBox="0 0 920 360" role="img" aria-label="How Quill works: a human signs the task boundary, the agent writes the diff, CI verifies the change and issues a signed PASS, NEEDS_REVIEW, or BLOCK Change Passport.">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#656d76"/>
</marker>
<marker id="arrok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#1a7f37"/>
</marker>
<marker id="arrwarn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#9a6700"/>
</marker>
<marker id="arrblock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#cf222e"/>
</marker>
<marker id="arracc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#0969da"/>
</marker>
</defs>
<rect x="16" y="56" width="220" height="168" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="30" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#656d76" text-anchor="start" opacity="1.0">1 · HUMAN</text>
<text x="30" y="82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#1f2328" text-anchor="start" opacity="1.0">Sign the boundary</text>
<text x="30" y="106" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="normal" fill="#0969da" text-anchor="start" opacity="1.0">quill begin "task"</text>
<text x="30" y="130" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">scope    src/auth/**</text>
<text x="30" y="148" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">forbid   workflows,</text>
<text x="30" y="164" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">         migrations</text>
<line x1="30" y1="178" x2="222" y2="178" stroke="#d0d7de" stroke-width="1"/>
<text x="30" y="198" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">signed: approver key</text>
<text x="30" y="214" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">(private key stays off-box)</text>
<rect x="292" y="56" width="176" height="168" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="306" y="44" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#656d76" text-anchor="start" opacity="1.0">2 · AI AGENT</text>
<text x="306" y="82" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="600" fill="#1f2328" text-anchor="start" opacity="1.0">Writes the diff</text>
<text x="306" y="106" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">opens a pull request</text>
<text x="306" y="130" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="600" fill="#656d76" text-anchor="start" opacity="1.0">untrusted:</text>
<text x="306" y="148" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">can't edit the workflow</text>
<text x="306" y="164" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">that judges it, can't</text>
<text x="306" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">forge the signatures</text>
<rect x="524" y="40" width="200" height="200" rx="8" fill="#ddf4ff" stroke="#0969da" stroke-width="1.5"/>
<text x="538" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11" font-weight="600" fill="#656d76" text-anchor="start" opacity="1.0">3 · CI (outside the agent's reach)</text>
<text x="538" y="68" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" font-weight="600" fill="#0969da" text-anchor="start" opacity="1.0">quill verify --strict</text>
<circle cx="544" cy="92" r="2.5" fill="#0969da"/>
<text x="556" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">in-scope paths only</text>
<circle cx="544" cy="114" r="2.5" fill="#0969da"/>
<text x="556" y="118" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">forbidden surfaces</text>
<circle cx="544" cy="136" r="2.5" fill="#0969da"/>
<text x="556" y="140" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">secrets in added lines</text>
<circle cx="544" cy="158" r="2.5" fill="#0969da"/>
<text x="556" y="162" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">symlink / submodule opacity</text>
<circle cx="544" cy="180" r="2.5" fill="#0969da"/>
<text x="556" y="184" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#1f2328" text-anchor="start" opacity="1.0">signature + repo binding</text>
<text x="538" y="226" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">deterministic: no model to jailbreak</text>
<rect x="782" y="48" width="122" height="52" rx="6" fill="#dafbe1" stroke="#1a7f37" stroke-width="1"/>
<text x="794" y="69" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#1a7f37" text-anchor="start" opacity="1.0">PASS</text>
<text x="794" y="87" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">merge · exit 0</text>
<line x1="724" y1="140.0" x2="778" y2="74.0" stroke="#1a7f37" stroke-width="1.5" marker-end="url(#arrok)"/>
<rect x="782" y="114" width="122" height="52" rx="6" fill="#fff8c5" stroke="#9a6700" stroke-width="1"/>
<text x="794" y="135" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#9a6700" text-anchor="start" opacity="1.0">NEEDS_REVIEW</text>
<text x="794" y="153" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">human looks first</text>
<line x1="724" y1="140.0" x2="778" y2="140.0" stroke="#9a6700" stroke-width="1.5" marker-end="url(#arrwarn)"/>
<rect x="782" y="180" width="122" height="52" rx="6" fill="#ffebe9" stroke="#cf222e" stroke-width="1"/>
<text x="794" y="201" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#cf222e" text-anchor="start" opacity="1.0">BLOCK</text>
<text x="794" y="219" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">build fails · exit 1</text>
<line x1="724" y1="140.0" x2="778" y2="206.0" stroke="#cf222e" stroke-width="1.5" marker-end="url(#arrblock)"/>
<line x1="236" y1="140.0" x2="288" y2="140.0" stroke="#656d76" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="468" y1="140.0" x2="520" y2="140.0" stroke="#656d76" stroke-width="1.5" marker-end="url(#arr)"/>
<rect x="16" y="276" width="888" height="62" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1"/>
<text x="32" y="301" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#1f2328" text-anchor="start" opacity="1.0">Change Passport</text>
<text x="32" y="321" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">every verdict is signed by the gate key into a tamper-evident record</text>
<text x="560" y="301" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="normal" fill="#0969da" text-anchor="start" opacity="1.0">quill verify-passport passport.json</text>
<text x="560" y="321" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#656d76" text-anchor="start" opacity="1.0">any reviewer re-checks the verdict; a forged PASS fails the signature</text>
<line x1="724" y1="246" x2="500" y2="272" stroke="#0969da" stroke-width="1.5" marker-end="url(#arracc)" stroke-dasharray="4 3"/>
</svg>
