<svg xmlns="http://www.w3.org/2000/svg" width="920" height="288" viewBox="0 0 920 288" role="img" aria-label="Four attacks and their countermeasures: workflow edits, planted keys, forged verdicts, and hidden changes are each neutralized by a control outside the PR's reach.">
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#8b949e"/>
</marker>
<marker id="arrok" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#3fb950"/>
</marker>
<marker id="arrwarn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#d29922"/>
</marker>
<marker id="arrblock" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#f85149"/>
</marker>
<marker id="arracc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M 0 1 L 9 5 L 0 9 z" fill="#58a6ff"/>
</marker>
</defs>
<text x="16" y="28" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="15" font-weight="600" fill="#e6edf3" text-anchor="start" opacity="1.0">Why the agent can't cheat</text>
<text x="16" y="48" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="normal" fill="#8b949e" text-anchor="start" opacity="1.0">every bypass in the threat model meets a countermeasure the PR cannot touch</text>
<rect x="16" y="72" width="212" height="188" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="30" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#f85149" text-anchor="start" opacity="1.0">THE AGENT…</text>
<text x="30" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="start" opacity="1.0">edits the CI workflow</text>
<text x="30" y="133" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start" opacity="1.0">to delete the Quill step</text>
<line x1="30" y1="154" x2="214" y2="154" stroke="#30363d" stroke-width="1"/>
<path d="M 117.0 153 L 122.0 161 L 127.0 153" fill="none" stroke="#3fb950" stroke-width="1.5"/>
<text x="30" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#3fb950" text-anchor="start" opacity="1.0">QUILL</text>
<text x="30" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">gate runs from the base branch</text>
<text x="30" y="217" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">(pull_request_target): only merged</text>
<text x="30" y="234" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">code controls the gate</text>
<rect x="240" y="72" width="212" height="188" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="254" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#f85149" text-anchor="start" opacity="1.0">THE AGENT…</text>
<text x="254" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="start" opacity="1.0">plants its own approver key</text>
<text x="254" y="133" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start" opacity="1.0">inside the checkout</text>
<line x1="254" y1="154" x2="438" y2="154" stroke="#30363d" stroke-width="1"/>
<path d="M 341.0 153 L 346.0 161 L 351.0 153" fill="none" stroke="#3fb950" stroke-width="1.5"/>
<text x="254" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#3fb950" text-anchor="start" opacity="1.0">QUILL</text>
<text x="254" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">strict mode only trusts keys pinned</text>
<text x="254" y="217" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">outside the checkout (CI secret /</text>
<text x="254" y="234" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">org variable), never repo files</text>
<rect x="464" y="72" width="212" height="188" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="478" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#f85149" text-anchor="start" opacity="1.0">THE AGENT…</text>
<text x="478" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="start" opacity="1.0">forges the verdict</text>
<text x="478" y="133" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start" opacity="1.0">PASS written over a BLOCK</text>
<line x1="478" y1="154" x2="662" y2="154" stroke="#30363d" stroke-width="1"/>
<path d="M 565.0 153 L 570.0 161 L 575.0 153" fill="none" stroke="#3fb950" stroke-width="1.5"/>
<text x="478" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#3fb950" text-anchor="start" opacity="1.0">QUILL</text>
<text x="478" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">the passport is signed by the gate</text>
<text x="478" y="217" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">key; verify-passport rejects any</text>
<text x="478" y="234" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">edited verdict</text>
<rect x="688" y="72" width="212" height="188" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
<text x="702" y="96" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#f85149" text-anchor="start" opacity="1.0">THE AGENT…</text>
<text x="702" y="116" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#e6edf3" text-anchor="start" opacity="1.0">hides the change</text>
<text x="702" y="133" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#8b949e" text-anchor="start" opacity="1.0">symlink / submodule indirection</text>
<line x1="702" y1="154" x2="886" y2="154" stroke="#30363d" stroke-width="1"/>
<path d="M 789.0 153 L 794.0 161 L 799.0 153" fill="none" stroke="#3fb950" stroke-width="1.5"/>
<text x="702" y="180" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="10" font-weight="700" fill="#3fb950" text-anchor="start" opacity="1.0">QUILL</text>
<text x="702" y="200" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">opaque redirects never silently</text>
<text x="702" y="217" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">PASS; surfaced as NEEDS_REVIEW</text>
<text x="702" y="234" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="11.5" font-weight="normal" fill="#e6edf3" text-anchor="start" opacity="1.0">with the target recorded</text>
</svg>
