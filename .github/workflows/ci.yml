name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type-check (mypy)
        run: mypy src/quill || true   # warn-level for v0.1; tighten before 1.0

      - name: Test
        run: pytest --no-cov tests/

      - name: Audit dependencies
        run: pip-audit --strict || true   # warn-level until we pin everything

  # Smoke-test each optional extra installs cleanly. Catches the case
  # where pyproject.toml references a version of an extra that doesn't
  # resolve, or a Linux-only system dep is missing for weasyprint.
  extras:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        extra: ["postgres", "otel", "pdf"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system deps for weasyprint
        if: matrix.extra == 'pdf'
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
      - name: Install with extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.extra }}]"
      - name: Import smoke
        run: python -c "import quill; import quill.cli; import quill.exports"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
