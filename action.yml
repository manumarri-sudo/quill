name: "Quill Change Control"
description: >-
  Verify AI-written diffs against a human-signed perimeter. Enforces the signed
  boundary (forbidden paths and gate-tamper edits BLOCK), scans added lines for
  secrets, checks approver provenance, and issues a gate-signed Quill Change
  Passport as a commit Status Check.
author: "Manu Marri"
branding:
  icon: "shield"
  color: "purple"

inputs:
  head:
    description: "Ref to verify against the contract's base commit."
    required: false
    default: "HEAD"
  passport-dir:
    description: "Directory for passport.json + passport.md."
    required: false
    default: ".quill"
  fail-on-block:
    description: "Exit 1 (fail the job) when the verdict is BLOCK."
    required: false
    default: "true"
  github-token:
    description: "Token used to publish the commit Status Check."
    required: false
    default: ${{ github.token }}
  head-sha:
    description: "Commit SHA to attach the Status Check to (defaults to the PR head)."
    required: false
    default: ${{ github.event.pull_request.head.sha }}
  quill-version:
    description: "Version spec for the quillx package (e.g. '==0.2.0a5'). Empty installs latest."
    required: false
    default: ""
  install-from-source:
    description: "Install quill from this checked-out repo instead of PyPI (used for dogfooding)."
    required: false
    default: "false"
  strict:
    description: >-
      Require a signed perimeter from a trusted approver. When true (recommended),
      an unsigned / tampered / absent perimeter BLOCKs instead of silently passing.
    required: false
    default: "true"
  gate-key:
    description: >-
      Gate identity PRIVATE key (PEM) used to sign the passport, so reviewers can
      verify the verdict with `quill verify-passport`. Pass from a repo/org secret,
      e.g. ${{ secrets.QUILL_GATE_KEY }}. Never commit this.
    required: false
    default: ""
  gate-pubkeys:
    description: >-
      Trusted gate PUBLIC key(s) (PEM) matching the gate-key. When set, the wrapper
      re-verifies the passport's own signature before trusting the verdict, so a
      tampered or unsigned passport fails the job closed. Pass from a secret/variable,
      e.g. ${{ vars.QUILL_GATE_PUBKEYS }}.
    required: false
    default: ""
  approver-pubkeys:
    description: >-
      Trusted approver PUBLIC keys (PEM) that may sign the perimeter. Pass from a
      secret/variable so a PR cannot edit the trust root, e.g.
      ${{ secrets.QUILL_APPROVER_PUBKEYS }}. The committed .quill/approvers/*.pub
      set is used in addition.
    required: false
    default: ""

outputs:
  verdict:
    description: "PASS, NEEDS_REVIEW, or BLOCK."
    value: ${{ steps.verify.outputs.verdict }}
  exit-code:
    description: "0 for PASS / NEEDS_REVIEW, 1 for BLOCK."
    value: ${{ steps.verify.outputs.exit_code }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Quill
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [[ "${{ inputs.install-from-source }}" == "true" ]]; then
          pip install -e "${{ github.action_path }}"
        else
          pip install "quillx${{ inputs.quill-version }}"
        fi

    - name: Verify diff against contract
      id: verify
      shell: bash
      env:
        QUILL_HEAD: ${{ inputs.head }}
        QUILL_PASSPORT_DIR: ${{ inputs.passport-dir }}
        QUILL_FAIL_ON_BLOCK: ${{ inputs.fail-on-block }}
        QUILL_HEAD_SHA: ${{ inputs.head-sha }}
        QUILL_STRICT: ${{ inputs.strict }}
        QUILL_GATE_KEY: ${{ inputs.gate-key }}
        QUILL_GATE_PUBKEYS: ${{ inputs.gate-pubkeys }}
        QUILL_APPROVER_PUBKEYS: ${{ inputs.approver-pubkeys }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: bash "${{ github.action_path }}/scripts/quill-passport.sh"
