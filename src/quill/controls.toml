# Quill control crosswalk - audit event types → compliance controls
#
# This is the canonical mapping that drives `quill audit export`. Each
# entry says: when these event types appear in the chain, that's the
# evidence an auditor wants to see for this specific control.
#
# Standards covered (June 2026):
#   - EU AI Act Articles 12 (record-keeping), 14 (human oversight), 19 (retention)
#   - AIUC-1 (Security, Reliability, Accountability, Society domains)
#   - NIST AI RMF (GOVERN, MAP, MEASURE, MANAGE) + GenAI Profile (AI 600-1)
#   - ISO/IEC 42001:2023 Annex A controls
#   - SOC 2 Type II Common Criteria (CC6 logical access, CC7 system ops,
#     CC8 change management, CC9 risk mitigation)
#   - MITRE ATLAS techniques relevant to AI agent tool dispatch
#   - OWASP Agentic Top 10 (referenced in descriptions; not a per-row mapping)
#
# Editing rules:
#   - Every quill_event_types entry must be an event type that Quill
#     actually emits today. Don't invent event types here.
#   - Descriptions paraphrase the standard, don't quote verbatim
#     (verbatim quotes belong in primary source citations, not config).
#   - Codes use the canonical standard's own notation (ART-12, CC6.1,
#     A.6.2.8, MANAGE-4.1, ATLAS-T0058, etc.).

# ============================================================================
# EU AI Act Article 14 (Human Oversight)
# https://artificialintelligenceact.eu/article/14/
# ============================================================================

[[controls]]
standard = "EU AI Act Art. 14"
code = "ART-14-IN-COMMAND"
title = "Human in command (refusal of unsafe action)"
description = """The high-risk AI system shall be designed and developed in such a way that it can be effectively overseen by natural persons. Refusal of unsafe actions is recorded with reason and timestamp."""
quill_event_types = ["verdict.blocked", "verdict.scope_violation"]

[[controls]]
standard = "EU AI Act Art. 14"
code = "ART-14-IN-LOOP"
title = "Human in-the-loop (explicit consent for high-risk actions)"
description = """Operators may halt or override the system. Each high-risk action requires explicit human consent before execution, recorded with the operator's identity-bound approval (Touch ID on macOS where available)."""
quill_event_types = ["verdict.ask", "approve.biometric.ok", "approve.biometric.deny"]

[[controls]]
standard = "EU AI Act Art. 14"
code = "ART-14-ON-LOOP"
title = "Human on-the-loop (explanation surfaced for low/medium-risk)"
description = """Operators receive a structured WHAT/WHY message for each automated decision so they can intervene asynchronously."""
quill_event_types = ["verdict.allowed"]

# ============================================================================
# EU AI Act Article 12 (Record-keeping) + Article 19 (Retention)
# https://artificialintelligenceact.eu/article/12/
# https://artificialintelligenceact.eu/article/19/
# ============================================================================

[[controls]]
standard = "EU AI Act Art. 12"
code = "ART-12-AUTO-LOGGING"
title = "Automatic event logging over the lifetime of the system"
description = """High-risk AI systems shall technically allow for the automatic recording of events (logs) over the lifetime of the system. Quill emits an event for every tool call attempt, decision, and human approval, with no operator action required after install."""
quill_event_types = ["tool.attempted", "verdict.allowed", "verdict.blocked", "verdict.ask"]

[[controls]]
standard = "EU AI Act Art. 12"
code = "ART-12-TAMPER-EVIDENT"
title = "Tamper-evident records"
description = """The logs must support post-market monitoring and incident investigation; Quill uses HMAC-SHA256 chaining (each entry signs over the previous entry's MAC plus the canonical payload) so any modification of past entries breaks chain verification on the next `quill audit verify`. This is locally tamper-EVIDENT (a holder of the HMAC key can rewrite the whole chain), not tamper-PROOF; external anchoring is required for immutability."""
quill_event_types = ["tool.attempted", "chain.repaired"]

[[controls]]
standard = "EU AI Act Art. 19"
code = "ART-19-RETENTION"
title = "Minimum 6-month log retention by providers"
description = """Providers shall maintain logs for a period appropriate to the intended purpose of the high-risk AI system, of at least six months. Quill's append-only JSONL with mode 0o600 supports the retention discipline; the operator owns the disk and the key."""
quill_event_types = ["tool.attempted"]

# ============================================================================
# AIUC-1 (AI Use Case framework, auditor: Schellman)
# https://www.aiuc-1.com/
# Controls cited per AIUC-1 public changelog (E015.2, D003.1, D003.3, D003.4, C007.3)
# ============================================================================

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-E015.2"
title = "AI agent logging - intermediate steps + tool calls + sub-agents"
description = """Intermediate steps between input and output are logged, including tool calls, sub-agent actions, and metadata across execution chains. Quill's per-tool-call event with tool_name, args_digest, decision, reason, and HMAC anchor PRODUCES EVIDENCE TOWARD the published AIUC-1 requirement; it does not by itself establish compliance, which depends on operational controls and auditor acceptance."""
quill_event_types = ["tool.attempted", "verdict.allowed", "verdict.blocked", "agent.handoff.out"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-D003.1"
title = "Tool authorization and validation"
description = """Validates tool execution against approved functions before dispatch. Quill's deterministic regex classifier matched against per-tool policy overrides answers this for every call without invoking an LLM."""
quill_event_types = ["tool.attempted", "verdict.scope_violation"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-D003.3"
title = "Tool call log including MCP server calls"
description = """Documents both traditional function calls and MCP server calls. Quill's MCP-proxy form factor logs both surfaces in one chained audit log."""
quill_event_types = ["tool.attempted"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-D003.4"
title = "Human-approval workflows for chained operations"
description = """Multi-step workflows where agents chain operations sequentially require human approval at the critical-risk threshold. Quill's type-to-confirm + Touch ID + paste-able one-shot tokens implement this."""
quill_event_types = ["verdict.ask", "approve.biometric.ok"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-C007.3"
title = "Human review workflow auditing (anti-automation-bias)"
description = """Audits oversight effectiveness to counter automation bias. Anti-fatigue (3-in-4-seconds rule), type-to-confirm, and Touch ID are all defenses against rubber-stamping; each invocation is itself logged."""
quill_event_types = ["verdict.ask", "approve.biometric.ok", "approve.biometric.deny"]

[[controls]]
standard = "AIUC-1 Security"
code = "AIUC-SEC-01"
title = "Tool poisoning + rug-pull detection"
description = """Tool descriptions visible to the LLM are SHA-256 fingerprinted at first sight; silent changes are refused. Mitigates the Invariant Labs MCP tool-poisoning attack class (March 2025 advisory)."""
quill_event_types = ["tool.attempted"]

[[controls]]
standard = "AIUC-1 Security"
code = "AIUC-SEC-02"
title = "Lethal-trifecta exposure detection and enforcement"
description = """Sessions that combine untrusted input + private data + exfiltration vectors trigger heightened gating. When the third flag would close, the gate escalates an otherwise-allow verdict to a deny with paste-token. Implements Simon Willison's Lethal Trifecta and Meta's Agents Rule of Two."""
quill_event_types = ["session.taint.update", "verdict.blocked"]

[[controls]]
standard = "AIUC-1 Reliability"
code = "AIUC-REL-01"
title = "Every routed tool call audited"
description = """Every tool call ROUTED THROUGH Quill's gate (the PreToolUse/MCP hook) emits an audit-log entry before it executes; calls that bypass the hook are not seen. The chain is HMAC-SHA256-linked so any tampering breaks subsequent verifications."""
quill_event_types = ["tool.attempted"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-ACC-01"
title = "Multi-agent handoff traceability"
description = """Sub-agent spawns and inter-agent handoffs carry a payload hash so a downstream consumer's actions can be traced back to the originating agent."""
quill_event_types = ["agent.handoff.out", "agent.handoff.in", "agent.cascade.affected"]

[[controls]]
standard = "AIUC-1 Accountability"
code = "AIUC-ACC-02"
title = "Permission decay (stale grants self-disable)"
description = """Per-tool policy overrides decay if not reaffirmed. Dormant permissions silently downgrade to defaults; the audit log records every downgrade."""
quill_event_types = ["policy.decayed"]

[[controls]]
standard = "AIUC-1 Society"
code = "AIUC-SOC-01"
title = "Operator self-flagged uncertainty surfaced"
description = """Agent-flagged uncertainties are persisted to the receipt for human review at session-end."""
quill_event_types = ["agent.flag.uncertain"]

# ============================================================================
# NIST AI Risk Management Framework (AI RMF 1.0, Jan 2023)
# + GenAI Profile (NIST AI 600-1, July 2024)
# https://www.nist.gov/itl/ai-risk-management-framework
# https://nvlpubs.nist.gov/nistpubs/ai/NIST.AI.600-1.pdf
# ============================================================================

[[controls]]
standard = "NIST AI RMF"
code = "GOVERN-1.4"
title = "Accountability documented across roles and decisions"
description = """The organization documents accountability for AI system decisions. Each Quill session_open / session_close pair captures the human operator boundaries; verdict events record who allowed/refused each call."""
quill_event_types = ["session.open", "session.close", "verdict.allowed", "verdict.blocked"]

[[controls]]
standard = "NIST AI RMF"
code = "MAP-4.1"
title = "Risk impacts documented over time"
description = """Risk impacts of AI system use are documented for review. The audit log's per-call risk classification (low/medium/high/critical) plus the verdict outcome provides the longitudinal record."""
quill_event_types = ["tool.attempted", "verdict.blocked", "session.taint.update"]

[[controls]]
standard = "NIST AI RMF"
code = "MEASURE-2.7"
title = "Security and resilience metrics with traceable data"
description = """AI system security and resilience are measured with traceable data. Quill's chain.repaired events plus chain integrity status give an auditable resilience signal across the log lifetime."""
quill_event_types = ["chain.repaired", "tool.attempted"]

[[controls]]
standard = "NIST AI RMF"
code = "MEASURE-2.8"
title = "Privacy risk measured and managed"
description = """Privacy risks (data exfiltration, secret exposure) are measured. Quill's lethal-trifecta enforcement and secret-detection-on-diff (26 vendor patterns, scanned on added lines at the merge gate) close this loop at the tool-call and change boundary."""
quill_event_types = ["session.taint.update", "verdict.blocked"]

[[controls]]
standard = "NIST AI RMF"
code = "MANAGE-4.1"
title = "Audit trail of treatment rationale and incident response"
description = """Treatment rationale and incident-response decisions are recorded over time. The `reason` field on every Quill block plus the `try_instead` remediation guidance is the rationale; chain.repaired events are themselves an incident-response audit trail."""
quill_event_types = ["verdict.blocked", "verdict.ask", "chain.repaired"]

[[controls]]
standard = "NIST GenAI Profile"
code = "GENAI-MG-3.1"
title = "Provenance of agent outputs and tool calls"
description = """For generative AI, provenance of outputs and tool calls is maintained. The HMAC chain plus tool_name + args_digest gives per-call provenance for any agent dispatch routed through Quill."""
quill_event_types = ["tool.attempted"]

[[controls]]
standard = "NIST GenAI Profile"
code = "GENAI-MS-2.6"
title = "Pre-deployment testing evidence for agent tool surfaces"
description = """Pre-deployment testing covers agent tool-call surfaces. Quill's `quill audit verify` and `quill doctor` give a per-deployment integrity baseline; the project's own test corpus (1,190+ unit + integration tests, including adversarial regression tests) is the substrate."""
quill_event_types = ["chain.repaired"]

# ============================================================================
# ISO/IEC 42001:2023 (AI Management Systems)
# https://www.iso.org/standard/42001
# A.6.2.8 - AI System Recording of Event Logs (the single highest-leverage row)
# ============================================================================

[[controls]]
standard = "ISO/IEC 42001"
code = "A.6.2.8"
title = "AI system recording of event logs"
description = """The organization shall determine at which phases of the AI system life cycle event log recording is enabled. Required fields per auditor expectation: actor identification, synchronized tamper-evident timestamp, action in business terms, before/after states, policy version, justification for overrides, anomaly flags. Auditor verification criteria include append-only storage, cryptographic hashing, immutable records, chain-of-custody, retrievability drills. Quill's HMAC-chained JSONL (mode 0o600) produces several of these fields automatically; full satisfaction depends on operator-provided identity, retention, time synchronization, and evidence-management procedures."""
quill_event_types = ["tool.attempted", "verdict.allowed", "verdict.blocked", "verdict.ask", "chain.repaired"]

[[controls]]
standard = "ISO/IEC 42001"
code = "A.6.2.6"
title = "Operation and monitoring of AI systems"
description = """The AI system is operated and monitored within defined boundaries. Quill's session scope (badge layer) defines those boundaries at session start; out-of-scope calls are refused with verdict.scope_violation."""
quill_event_types = ["session.open", "verdict.scope_violation", "verdict.allowed"]

[[controls]]
standard = "ISO/IEC 42001"
code = "A.6.2.7"
title = "Documentation of AI system life cycle"
description = """The AI system life cycle is documented. Quill's audit log captures the runtime portion of the life cycle; static documentation (model cards, intended use, evaluation reports) lives outside Quill's scope but is referenced by Quill's session.open intent field."""
quill_event_types = ["session.open"]

# ============================================================================
# SOC 2 Type II - Common Criteria
# AICPA TSP Section 100 (2017 with 2022 revised Points of Focus)
# Note: AICPA has NOT issued AI-specific TSC. These mappings apply the
# existing criteria to agent activity, which is plausible per the 2022
# broadening of "logical access" to cover contractors/vendors/partners.
# Whether any individual auditor accepts the mapping is auditor-specific.
# ============================================================================

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC6.1"
title = "Logical access security software, infrastructure, and architectures"
description = """The entity implements logical access controls. An AI agent dispatching Bash/Edit/Write/git is functionally an authenticated principal performing logical-access events; Quill's audit log captures timestamp, agent_id, tool_name, args_digest, decision, and reason per call."""
quill_event_types = ["tool.attempted", "verdict.blocked", "verdict.scope_violation"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC6.2"
title = "New users provisioned and credentials authorized"
description = """New users (or in Quill's framing, new agent sessions) are provisioned and authorized. session.open events bind a session_id to an operator-provided intent + scope, which serves as the per-session credential boundary."""
quill_event_types = ["session.open"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC6.3"
title = "Authorized access revoked when no longer needed"
description = """Access is revoked when no longer required. Quill's Permission Decay framework decays per-tool overrides if not reaffirmed; one-shot approval tokens self-revoke after TTL or single use."""
quill_event_types = ["policy.decayed"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC7.2"
title = "Monitoring for anomalies"
description = """The entity monitors system components for anomalies. Every Quill block (verdict.blocked, verdict.scope_violation) is a detected anomaly; the audit log is the monitoring substrate."""
quill_event_types = ["verdict.blocked", "verdict.scope_violation", "session.taint.update"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC7.3"
title = "Evaluation of detected security events"
description = """Detected security events are evaluated. The `reason` field on every Quill block is the documented evaluation; the `try_instead` field is the remediation guidance handed back to the operator."""
quill_event_types = ["verdict.blocked"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC7.4"
title = "Incident response with documented actions"
description = """The entity responds to identified security incidents. Touch ID / type-to-confirm approval flows are documented incident-handling actions; chain.repaired events themselves record any incident affecting the audit substrate."""
quill_event_types = ["approve.biometric.ok", "approve.biometric.deny", "chain.repaired", "verdict.blocked"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC8.1"
title = "Change management for system changes"
description = """Changes to infrastructure, data, software, and procedures are authorized, designed, tested, approved, and implemented. An agent doing `git push --force`, `npm publish`, `terraform apply`, or `vercel --prod` is implementing a change; Quill logs the attempt + decision + human approval (if any) + outcome. Whether an individual auditor accepts agent-initiated changes under CC8.1 is auditor-specific; the AICPA has not published an opinion."""
quill_event_types = ["tool.attempted", "verdict.allowed", "verdict.blocked", "approve.biometric.ok"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC9.1"
title = "Risk mitigation for business disruptions"
description = """The entity identifies and mitigates risks that could disrupt operations. Quill itself is a mitigating control for the AI-agent-broke-prod risk class; the audit log + block decisions are the evidence."""
quill_event_types = ["verdict.blocked", "session.taint.update"]

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC9.2"
title = "Vendor and third-party risk management"
description = """The entity addresses risks from vendors and business partners, including AI service providers. Tool-description pinning (anti-rug-pull) is a third-party-risk mitigation at the MCP boundary."""
quill_event_types = ["tool.attempted"]

# ============================================================================
# MITRE ATLAS (Adversarial Threat Landscape for AI Systems)
# v5.4.0 added agent-specific techniques in February 2026
# https://atlas.mitre.org/
# Technique IDs cited per public ATLAS matrix; verify against the latest
# release before publishing the mapping externally.
# ============================================================================

[[controls]]
standard = "MITRE ATLAS"
code = "ATLAS-POISONED-TOOL"
title = "Mitigation: Publish Poisoned AI Agent Tool"
description = """ATLAS v5.4.0 added the 'Publish Poisoned AI Agent Tool' technique. Quill's tool-description SHA-256 pinning refuses to re-advertise tools whose digest changed silently, which is the direct mitigation."""
quill_event_types = ["tool.attempted"]

[[controls]]
standard = "MITRE ATLAS"
code = "ATLAS-ESCAPE-HOST"
title = "Mitigation: Escape to Host"
description = """ATLAS v5.4.0 added the 'Escape to Host' technique. Quill's CVE-2025-59536 subcommand-chain bypass gate (policy.py line 333) refuses bash commands where any chained segment is critical-risk, which closes the most-cited host-escape route for Claude Code."""
quill_event_types = ["verdict.blocked"]

[[controls]]
standard = "MITRE ATLAS"
code = "ATLAS-TOOL-MISUSE"
title = "Mitigation: Tool Misuse (broad)"
description = """ATLAS Tool Misuse technique class. Quill's deterministic regex classifier with default-critical patterns for rm -rf, git push --force, DROP TABLE, vercel --prod, npm publish, stripe mutations, .env reads, banking transfers, and outbound communication covers the most common misuse modes by name."""
quill_event_types = ["verdict.blocked", "verdict.ask"]

# ============================================================================
# Change Control (the CI/CD PR gate) — the headline surface.
# These map the verification.run + contract.created events that `quill verify`
# and `quill begin` emit, which the earlier crosswalk (local-gate only) missed.
# Every row carries auditor_sampling: how a reviewer would test the evidence.
# ============================================================================

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC8.1-CHANGE-AUTHORIZED"
title = "Changes are authorized against an approved scope before merge"
description = """Each AI-authored change is verified in CI against a human-approved contract/perimeter (allowed paths, forbidden surfaces, no secrets) before it can merge. The verdict (PASS / NEEDS_REVIEW / BLOCK) is recorded as a verification.run event and issued as a signed Change Passport."""
quill_event_types = ["verification.run", "contract.created"]
auditor_sampling = """Select a sample of merged PRs; for each, retrieve the Change Passport and confirm it cites a verification.run MAC present in the chain, the verdict was PASS or a reviewed NEEDS_REVIEW, and the branch-protection required check passed. Confirm no PR with a BLOCK verdict was merged."""

[[controls]]
standard = "SOC 2 Common Criteria"
code = "CC6.1-SCOPE-ENFORCED"
title = "Out-of-scope and forbidden-surface changes are denied"
description = """The gate denies a change that touches paths outside the approved scope or any forbidden perimeter surface (CI workflows, approver keys, the perimeter itself), recording the offending paths in the verification.run payload (out_of_scope, forbidden_hits, gate_tamper_hits)."""
quill_event_types = ["verification.run"]
auditor_sampling = """Sample verification.run events with verdict=BLOCK; confirm the payload names the out-of-scope or forbidden paths and that the corresponding PR did not merge. Attempt a control test: open a PR touching a forbidden path and confirm it BLOCKs."""

[[controls]]
standard = "EU AI Act Art. 14"
code = "ART-14-CHANGE-OVERSIGHT"
title = "Human oversight over what the agent is permitted to change"
description = """A human records the approved task and scope (contract.created) and signs the standing perimeter; the agent's diffs are measured against that human-approved boundary, so a person — not the model — defines what may change."""
quill_event_types = ["contract.created", "verification.run"]
auditor_sampling = """Confirm a signed perimeter exists and is signed by a trusted approver key held off the build machine; sample contract.created events and tie each to a named approver. Verify (quill status) reports an enforced boundary, not cooperative mode."""

[[controls]]
standard = "AIUC-1"
code = "AIUC-ACC-PROVENANCE"
title = "Authenticity of the verdict and the approval (non-repudiation)"
description = """The verdict is signed by the gate identity (Ed25519) and re-verifiable with `quill verify-passport`; the perimeter is signed by a human approver whose private key is off the agent's machine. Verification uses a public key, so a third party can check authenticity without being able to forge it."""
quill_event_types = ["verification.run"]
auditor_sampling = """Take a passport.json and run `quill verify-passport` against the published gate public key; confirm it validates and that altering the verdict fails verification. Confirm the approver/gate private keys are stored as CI secrets or hardware, never committed."""

# ============================================================================
# USA regulatory + federal standards.
# Mapped only where Quill's actual evidence (tamper-evident chain, Ed25519
# signatures, scope/secret enforcement records, human-approval provenance)
# genuinely supports the control. These say "produces evidence relevant to",
# NOT "certifies compliance with".
# ============================================================================

[[controls]]
standard = "NIST SP 800-53"
code = "SI-7-INTEGRITY"
title = "Software, firmware, and information integrity"
description = """Integrity-verification mechanisms detect unauthorized changes to information. Quill's audit chain is HMAC-SHA256 chained and the Change Passport / tree head are Ed25519-signed, so unauthorized modification of the evidence is detectable (and, with the Merkle transparency anchor, provable to a third party)."""
quill_event_types = ["tool.attempted", "verification.run", "chain.repaired"]
auditor_sampling = """Run `quill audit verify` and confirm the chain reports intact; alter one past entry and confirm verification fails. For a signed passport, run `quill verify-passport` and confirm a tampered verdict fails signature check."""

[[controls]]
standard = "NIST SP 800-53"
code = "AU-10-NON-REPUDIATION"
title = "Non-repudiation of recorded actions and decisions"
description = """The system binds actions/decisions to an origin such that the actor cannot later deny them. Each verdict CAN be signed by the gate identity (when a gate key is configured) and each approval by a human approver key held off the build machine; verification is public, forgery requires the private key. Verdict signing is opt-in, not on by default."""
quill_event_types = ["verification.run", "approve.biometric.ok"]
auditor_sampling = """Confirm the signing keys are stored as CI secrets or hardware (never committed). Verify a passport against the published public key; confirm a third party can validate authenticity without being able to mint a new verdict."""

[[controls]]
standard = "NIST SP 800-53"
code = "AU-9-PROTECT-AUDIT-INFO"
title = "Protection of audit information from unauthorized modification"
description = """Audit records are protected against unauthorized deletion and modification. The chain is tamper-evident and a sealed high-water-mark (.head) plus the Merkle transparency anchor make trailing truncation and rewrite of already-recorded history detectable from a small off-box anchor."""
quill_event_types = ["tool.attempted", "verification.run"]
auditor_sampling = """Confirm an off-box anchor (published tree head / Status Check) exists; delete trailing entries locally and confirm `quill audit verify` against the sealed count flags the shortfall."""

[[controls]]
standard = "FTC Act Section 5"
code = "FTC-5-SUBSTANTIATION"
title = "Substantiation of claims about automated/AI conduct"
description = """Section 5 reaches unfair or deceptive practices; the FTC has acted on unsubstantiated AI claims. Quill's verifiable record of what each agent was permitted to do and what each change touched provides contemporaneous evidence to substantiate representations about AI behavior — evidence, not a compliance certification."""
quill_event_types = ["verification.run", "verdict.blocked", "verdict.allowed"]
auditor_sampling = """For a representation made about the agent (e.g. "agents cannot deploy to prod"), locate the perimeter rule and the verification.run BLOCKs that enforce it; confirm the evidence supports the claim as stated."""

[[controls]]
standard = "Colorado AI Act (SB 24-205)"
code = "CO-AI-RECORDS"
title = "Risk-management records for consequential AI decisions"
description = """Developers/deployers of high-risk AI must exercise reasonable care and maintain records of risk-management measures. Quill's signed perimeter (the documented allowed/forbidden boundary) plus the per-change verification records form a contemporaneous risk-management trail for changes an AI agent makes."""
quill_event_types = ["contract.created", "verification.run"]
auditor_sampling = """Confirm a signed perimeter defines the high-risk boundaries (auth, data, deploy paths); sample verification.run records over the review window and confirm coverage of every merged AI-authored change."""
