[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "quill"
version = "0.1.0"
description = "An MCP proxy that gates risky AI actions, pauses high-risk ones for a human, and keeps a tamper-evident audit log."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Manu Marri" },
]
keywords = [
    "mcp",
    "model-context-protocol",
    "ai-agents",
    "agent-governance",
    "human-in-the-loop",
    "audit",
    "security",
    "claude-code",
    "cursor",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
    "Typing :: Typed",
]
dependencies = [
    "anyio>=4.4",
    "pydantic>=2.7",
    "structlog>=24.1",
    "rich>=13.7",
    "typer>=0.12",
    "mcp>=1.0",
    "textual>=0.85",
]

[project.optional-dependencies]
keyring = ["keyring>=24"]
postgres = ["asyncpg>=0.29"]
all = ["quill[keyring,postgres]"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.100",
    "syrupy>=4.6",
    "ruff>=0.5",
    "mypy>=1.10",
    "pyright>=1.1.370",
    "pip-audit>=2.7",
]

[project.scripts]
quill = "quill.cli:app"

[project.urls]
Homepage = "https://github.com/manumarri/quill"
Documentation = "https://quill.dev"
Source = "https://github.com/manumarri/quill"
Changelog = "https://github.com/manumarri/quill/blob/main/CHANGELOG.md"
Issues = "https://github.com/manumarri/quill/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/quill"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",   # pycodestyle, pyflakes, warnings
    "I",             # isort
    "N",             # pep8-naming
    "UP",            # pyupgrade
    "B",             # bugbear
    "C4",            # comprehensions
    "SIM",           # simplify
    "RUF",           # ruff-specific
    "S",             # bandit (security)
    "ANN",           # annotations
    "PTH",           # pathlib
    "PL",            # pylint
    "TCH",           # type-checking
    "TID",           # tidy-imports
]
ignore = [
    "ANN101", "ANN102",   # self / cls annotations
    "PLR0913",            # too many args
    "S101",               # asserts in tests are fine
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["ANN", "S", "PL"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
strict = true
warn_unreachable = true
warn_return_any = true
disallow_any_explicit = true
files = ["src/quill"]
python_version = "3.11"

[[tool.mypy.overrides]]
module = ["mcp.*"]
ignore_missing_imports = true

[tool.pyright]
include = ["src/quill"]
typeCheckingMode = "strict"
pythonVersion = "3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--cov=quill",
    "--cov-report=term-missing",
    "--cov-fail-under=85",
]
markers = [
    "bench: performance benchmarks (deselect with '-m \"not bench\"')",
    "integration: integration tests with real subprocesses",
]

[tool.coverage.run]
source = ["src/quill"]
branch = true

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@abstractmethod",
]
